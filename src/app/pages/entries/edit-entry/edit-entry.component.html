<div class="edit-entry-container">
  @if (sourceId()) {
    <app-entry
      [parentComponent]="'edit-entry'"
      [access]="access()"
      [values]="values()"
      [sourceId]="sourceId()"
      [attachments]="attachments()"
    />
  } @else {
    @if (isLoading()) {
      <div class="mt-3">
        <app-loading message="Getting entry" />
      </div>
    } @else {
      <app-not-found />
    }
  }
</div>

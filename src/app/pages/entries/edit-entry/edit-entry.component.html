<div class="edit-entry-container">
  @if (document()) {
    <app-entry parentComponent="edit-entry" [access]="access()" [document]="document()" />
  } @else {
    @if (isLoading()) {
      <div class="mt-4">
        <app-loading message="Getting entry" />
      </div>
    } @else {
      <app-error-entry [errorCode]="errorCode()" />
    }
  }
</div>

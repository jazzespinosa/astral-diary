<div class="view-entry-container">
  @if (document()) {
    <app-entry parentComponent="view-entry" access="view" [document]="document()" />
  } @else {
    @if (isLoading()) {
      <div class="mt-4">
        <app-loading message="Getting entry" />
      </div>
    } @else {
      <app-error-entry [errorCode]="errorCode()" />
    }
  }
</div>

<ngt-canvas [camera]="{ position: [0, 0, 4] }">
  <ngt-ambientLight [intensity]="0.6" />
  <ngt-directionalLight [position]="[3, 3, 3]" [intensity]="1.2" />

  <ngt-mesh>
    <!-- ShapeGeometry from a THREE.Shape -->
    <ngt-shapeGeometry [args]="[starShape]" />
    <ngt-meshStandardMaterial color="black" />
  </ngt-mesh>
</ngt-canvas>

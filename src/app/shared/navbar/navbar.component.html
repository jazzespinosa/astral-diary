<div class="navbar" [ngClass]="{ scrolled: isScrolled }">
  <button
    class="btn"
    type="button"
    data-bs-toggle="offcanvas"
    data-bs-target="#offcanvasWithBothOptions"
    aria-controls="offcanvasWithBothOptions"
  >
    <i class="fa-solid fa-bars"></i>
  </button>
  <i class="fa-solid fa-user-astronaut"></i>
</div>

<div
  class="offcanvas offcanvas-start d-flex flex-column position-fixed p-3 align-items-center gap-4"
  [ngClass]="[
    appService.isBackgroundMilkyWay() ? 'bg-milky-way' : 'bg-fantasy-blue',
    activeLink === '/home' ? 'transparent-bg' : '',
  ]"
  data-bs-scroll="true"
  tabindex="-1"
  id="offcanvasWithBothOptions"
  aria-labelledby="offcanvasWithBothOptionsLabel"
>
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasWithBothOptionsLabel">ASTRAL DIARY</h5>
  </div>
  <div class="offcanvas-body">
    <div class="list-group">
      <a
        class="list-group-item list-group-item-action"
        routerLink="/home"
        [ngClass]="{ active: activeLink === '/home' }"
        data-bs-dismiss="offcanvas"
        ><i class="fa-solid fa-house-chimney me-2"></i>Home</a
      >
      <a
        class="list-group-item list-group-item-action"
        [ngClass]="{ active: activeLink.startsWith('/entry') }"
        role="button"
        id="collapseEntryParent"
        href="#collapseEntry"
        data-bs-toggle="collapse"
        aria-expanded="false"
        aria-controls="collapseEntry"
      >
        <i class="fa-solid fa-feather me-2"></i>
        Entries
        <div class="caret-container position-absolute top-50 translate-middle-y">
          <i class="caret fa-solid fa-caret-right"></i>
        </div>
      </a>
      <div class="collapse" id="collapseEntry">
        <ul class="sub-list">
          <li
            class="list-group-item list-group-item-action"
            [ngClass]="{ active: activeLink === '/entry/add' }"
            routerLink="entry/add"
            data-bs-dismiss="offcanvas"
          >
            <i class="fa-solid fa-plus me-2"></i>
            Add New Entry
          </li>
          <li
            class="list-group-item list-group-item-action"
            [ngClass]="{ active: activeLink === '/entry/search' }"
            routerLink="entry/search"
            data-bs-dismiss="offcanvas"
          >
            <i class="fa-solid fa-magnifying-glass me-2"></i>
            Search Entry
          </li>
          <li
            class="list-group-item list-group-item-action"
            routerLink="entry/drafts"
            [ngClass]="{ active: activeLink === '/entry/drafts' }"
            data-bs-dismiss="offcanvas"
          >
            <i class="fa-regular fa-pen-to-square me-2"></i>
            Drafts
          </li>
        </ul>
      </div>
      <a
        class="list-group-item list-group-item-action"
        routerLink="/calendar"
        [ngClass]="{ active: activeLink === '/calendar' }"
        data-bs-dismiss="offcanvas"
        ><i class="fa-solid fa-calendar-days me-2"></i>Calendar</a
      >
      <a
        class="list-group-item list-group-item-action"
        routerLink="/about"
        [ngClass]="{ active: activeLink === '/about' }"
        data-bs-dismiss="offcanvas"
        ><i class="fa-solid fa-circle-info me-2"></i>About</a
      >
      <a
        class="list-group-item list-group-item-action"
        routerLink="/test"
        [ngClass]="{ active: activeLink === '/test' }"
        data-bs-dismiss="offcanvas"
        >Test</a
      >
      <a
        class="list-group-item list-group-item-action"
        routerLink="/test2"
        [ngClass]="{ active: activeLink === '/test2' }"
        data-bs-dismiss="offcanvas"
        >Test2</a
      >
    </div>

    <div class="form-check form-switch form-check-reverse" [hidden]="activeLink !== '/home'">
      <!-- <div class="form-check form-switch form-check-reverse"> -->
      <label class="form-check-label" for="switchCheckDefault">Milky Way Background</label>
      <input
        class="form-check-input"
        type="checkbox"
        role="switch"
        id="switchCheckDefault"
        (change)="toggleBackground()"
      />
    </div>
  </div>
</div>

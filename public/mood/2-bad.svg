<svg xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 100 100"
         width="200" height="200"
         role="img"
         aria-label="orange sad emoji">

        <!-- Face (orange circle) -->
        <circle cx="50" cy="50" r="45"
                fill="#ff9f43"
                stroke="#e67e22"
                stroke-width="2"/>

        <!-- Eyebrows – slightly angled down (less dramatic than original) -->
        <path d="M 28 32 Q 35 27 42 32"
              stroke="#2c3e50"
              stroke-width="3"
              fill="none"
              stroke-linecap="round"/>
        <path d="M 58 32 Q 65 27 72 32"
              stroke="#2c3e50"
              stroke-width="3"
              fill="none"
              stroke-linecap="round"/>

        <!-- Eyes (sad, slightly droopy) -->
        <ellipse cx="35" cy="42" rx="6" ry="7" fill="#2c3e50"/>
        <ellipse cx="65" cy="42" rx="6" ry="7" fill="#2c3e50"/>

        <!-- Eye highlights -->
        <circle cx="33" cy="40" r="2" fill="white"/>
        <circle cx="63" cy="40" r="2" fill="white"/>

        <!-- Less sad mouth (shallower frown, less droop) -->
        <path d="M 28 72 Q 50 58 72 72"
              stroke="#2c3e50"
              stroke-width="3"
              fill="none"
              stroke-linecap="round"/>
    </svg>